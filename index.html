<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Roys Wanimbo | Stark Industries</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:radial-gradient(circle at top,#220505,#090909 55%,#000);color:#fff;overflow:hidden}
.wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;padding:20px}
.hud,.hud2{position:absolute;border:1px solid rgba(249,115,22,.18);border-radius:50%;animation:spin 18s linear infinite}
.hud{width:620px;height:620px}
.hud2{width:760px;height:760px;animation-direction:reverse}
.particles{position:absolute;inset:0;background-image:radial-gradient(#fb923c88 1px,transparent 1px);background-size:26px 26px;opacity:.45}
.card{position:relative;z-index:2;width:min(1200px,96%);display:grid;grid-template-columns:1.1fr .9fr;gap:34px}
.left{padding:48px;border-radius:30px;background:rgba(255,255,255,.04);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.1);box-shadow:0 30px 80px rgba(0,0,0,.55)}
.badge{display:inline-block;padding:10px 18px;border-radius:999px;background:#f9731633;border:1px solid #fb923c66;margin-bottom:18px}
.title{font-size:clamp(2.8rem,7vw,6rem);font-weight:900;line-height:1}
.grad{background:linear-gradient(90deg,#fde68a,#fb923c,#ef4444);-webkit-background-clip:text;color:transparent}
.sub{margin:16px 0;color:#fdba74;font-size:1.2rem;min-height:32px}
.desc{line-height:1.9;opacity:.92}
.btn{display:inline-block;padding:15px 26px;border-radius:16px;text-decoration:none;color:#fff;font-weight:800;margin:10px 10px 0 0}
.pri{background:linear-gradient(90deg,#f97316,#dc2626)}
.sec{border:1px solid rgba(255,255,255,.14)}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:24px}
.box{padding:16px;border-radius:18px;background:rgba(255,255,255,.04)}
.right{display:flex;justify-content:center;align-items:center}
.frame{width:430px;height:510px;border-radius:34px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;position:relative}
.reactor{position:absolute;width:320px;height:320px;border-radius:50%;background:radial-gradient(circle,#67e8f9,#0284c7 40%,transparent 60%);filter:blur(8px);opacity:.8;animation:pulse 2s infinite}
.ring,.ring2,.ring3{position:absolute;border-radius:50%;border:2px solid rgba(103,232,249,.35)}
.ring{width:260px;height:260px;animation:spin 8s linear infinite}
.ring2{width:320px;height:320px;animation:spinR 12s linear infinite}
.ring3{width:380px;height:380px;animation:spin 16s linear infinite}
.avatar{width:240px;height:240px;border-radius:50%;padding:8px;background:linear-gradient(45deg,#f97316,#ef4444,#f59e0b);position:relative;z-index:2;animation:float 4s ease-in-out infinite}
.avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.scan{position:absolute;width:100%;height:2px;background:#67e8f9;box-shadow:0 0 20px #67e8f9;animation:scan 3s infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinR{to{transform:rotate(-360deg)}}
@keyframes pulse{50%{transform:scale(1.08);opacity:1}}
@keyframes float{50%{transform:translateY(-12px)}}
@keyframes scan{0%{top:15%}50%{top:85%}100%{top:15%}}
@media(max-width:900px){.card{grid-template-columns:1fr}.right{order:-1}.frame{width:320px;height:360px}.avatar{width:180px;height:180px}.ring{width:220px;height:220px}.ring2{width:270px;height:270px}.ring3{width:320px;height:320px}.stats{grid-template-columns:1fr}}
.enterTxt{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);padding:12px 22px;border-radius:999px;background:rgba(26, 1, 255, 0.15);border:1px solid rgba(255, 6, 172, 0.35);font-weight:700;letter-spacing:1px;z-index:5;animation:blink 1.2s infinite}
.loader3d{position:fixed;inset:0;background:radial-gradient(circle,#111,#000);display:none;align-items:center;justify-content:center;flex-direction:column;z-index:999;pointer-events:auto}
.loader3d.active{display:flex}
.borderArc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none}
.borderArc:before{content:"";position:absolute;width:min(520px,82vw);height:min(520px,82vw);border-radius:50%;border:1px solid rgba(249,115,22,.18);box-shadow:0 0 40px rgba(245, 1, 172, 0.18);animation:arcSpin 2.4s linear infinite}
.borderSweep{position:absolute;width:min(520px,82vw);height:min(520px,82vw);border-radius:50%;background:conic-gradient(from 90deg,rgba(255, 2, 171, 0),rgba(103,232,249,.75),rgba(255, 3, 129, 0));filter:blur(.4px);opacity:.55;animation:sweep 1.1s ease-in-out infinite}
.borderGlow{position:absolute;width:min(520px,82vw);height:min(520px,82vw);border-radius:50%;box-shadow:0 0 120px rgba(103,232,249,.18);opacity:.25;animation:glowPulse 1.8s ease-in-out infinite}
@keyframes sweep{0%{transform:rotate(0deg) scale(.98);opacity:.25}50%{opacity:.7}100%{transform:rotate(360deg) scale(1.02);opacity:.25}}
@keyframes arcSpin{to{transform:rotate(360deg)}}
@keyframes glowPulse{50%{opacity:.55;transform:scale(1.02)}100%{opacity:.25;transform:scale(1)}}
.cube{width:90px;height:90px;position:relative;transform-style:preserve-3d;animation:rot 2.5s linear infinite}
.cube div{position:absolute;width:90px;height:90px;background:rgba(255, 6, 143, 0.18);border:2px solid #2600ff;box-shadow:0 0 25px #ff0095}
.f1{transform:translateZ(45px)}
.f2{transform:rotateY(180deg) translateZ(45px)}
.f3{transform:rotateY(90deg) translateZ(45px)}
.f4{transform:rotateY(-90deg) translateZ(45px)}
.f5{transform:rotateX(90deg) translateZ(45px)}
.f6{transform:rotateX(-90deg) translateZ(45px)}
.loadText{margin-top:28px;color:#ff0180;font-weight:800;letter-spacing:2px}
@keyframes rot{to{transform:rotateX(360deg) rotateY(360deg)}}
@keyframes blink{50%{opacity:.35}}
</style>
</head>
<body>
<div class="wrap">
<div class="particles"></div><div class="hud"></div><div class="hud2"></div>
<div class="card">
<div class="left">
<div class="badge">⚙️ STARK INDUSTRIES</div>
<div class="title">Hi, I'm <span class="grad">Roys Wanimbo</span></div>
<div class="sub" id="typing"></div>
<div class='enterTxt'>Masuk Ke Aplikasi </div><div class='loader3d' id='loader'>
  <div class='borderArc' aria-hidden='true'>
    <div class='borderSweep'></div>
    <div class='borderGlow'></div>
  </div>
  <div class='cube'><div class='f1'></div><div class='f2'></div><div class='f3'></div><div class='f4'></div><div class='f5'></div><div class='f6'></div></div>
  <div class='loadText'>STARK INDUSTRIES LOADING...</div>
</div></body>
</div>
<div class="right"><div class="frame"><div class="reactor"></div><div class="ring"></div><div class="ring2"></div><div class="ring3"></div><div class="scan"></div><div class="avatar"><img src="https://royswanimbo-dev.github.io/royswanimbo.io/assets/images/roys/Profile-roys.png"></div></div></div>
</div></div>
<script>
const words = ['JARVIS Online','Armor Systems Ready','Roys Wanimbo | Full Stack Developer'];
let i = 0, j = 0;
let deleting = false;
const el = document.getElementById('typing');
let intervalId = null;
let started = false;

function startTyping(){
  intervalId = setInterval(()=>{
    const w = words[i];
    el.textContent = w.slice(0, j);

    if (!deleting) {
      j++;
      if (j > w.length) {
        deleting = true;
        clearInterval(intervalId);
        setTimeout(()=>{
          intervalId = setInterval(()=>{
            const ww = words[i];
            el.textContent = ww.slice(0, j);

            j--;
            if (j <= 0) {
              deleting = false;
              i = (i + 1) % words.length;
              clearInterval(intervalId);
              setTimeout(()=>{ intervalId = setInterval(tick, 100); }, 400);
            }
          }, 100);
        }, 900);
      }
    }
  }, 100);
}

// tick() digunakan saat fase mengetik berikutnya
function tick(){
  const w = words[i];
  el.textContent = w.slice(0, j);

  if (!deleting) {
    j++;
    if (j > w.length) {
      deleting = true;
      clearInterval(intervalId);
      setTimeout(()=>{
        intervalId = setInterval(()=>{
          const ww = words[i];
          el.textContent = ww.slice(0, j);

          j--;
          if (j <= 0) {
            deleting = false;
            i = (i + 1) % words.length;
            clearInterval(intervalId);
            setTimeout(()=>{ intervalId = setInterval(tick, 100); }, 400);
          }
        }, 100);
      }, 900);
    }
  }
}

startTyping();


document.body.style.cursor = 'pointer';
document.body.addEventListener('click', ()=>{
  if (started) return;
  started = true;

  // stop typing animation
  if (intervalId) clearInterval(intervalId);

  const loader = document.getElementById('loader');
loader.style.display = 'flex';
  loader.classList.add('active');
  document.body.style.overflow = 'hidden';

  const speak = new SpeechSynthesisUtterance('Hello Roys Wanimbo');
  speak.rate = 0.95;
  speak.pitch = 1.0;
  speak.lang = 'id-ID';
  speechSynthesis.speak(speak);

  setTimeout(()=>{
    window.location.href = 'https://royswanimbo.base44.app/';
  }, 3200);
}, { once: true });
</script>

</html>
